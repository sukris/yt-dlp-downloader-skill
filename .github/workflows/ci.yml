name: CI

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

permissions:
  contents: read

jobs:
  validate:
    name: validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install runtime tools on Ubuntu
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3-pip
          python3 -m pip install --user --upgrade yt-dlp
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install runtime tools on macOS
        if: runner.os == 'macOS'
        run: |
          brew install ffmpeg yt-dlp

      - name: Check shell syntax
        run: bash -n scripts/ytdlp_download.sh

      - name: Run validation suite
        run: tests/validate.sh
